<!DOCTYPE html>
<html>
<head>
  <title>Admin - Monique's Store</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #f7f3ea;
      margin: 0;
      padding: 20px;
    }

    h1 { text-align: center; }

    .panel {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .logout-btn {
      background: #e74c3c;
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab-btn {
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #ddd;
    }

    .tab-btn.active {
      background: #c2b59b;
      color: white;
    }

    .section { display: none; }
    .section.active { display: block; }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #c2b59b;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    .danger {
      background: red;
      border: none;
      padding: 6px 10px;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-right: 5px;
    }

    .paid { background: #2ecc71; }
    .delivered { background: #3498db; }
    .delete { background: #e74c3c; }

    .status {
      padding: 4px 8px;
      border-radius: 10px;
      background: #eee;
      font-size: 12px;
    }
  </style>
</head>

<body>

<h1>Admin Panel</h1>

<div class="panel">

  <div class="header-bar">
    <h3>Dashboard</h3>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('productsTab', event)">Products</button>
    <button class="tab-btn" onclick="showTab('ordersTab', event)">Orders</button>
  </div>

  <!-- PRODUCTS -->
  <div id="productsTab" class="section active">

    <h3>Add Product</h3>

    <input id="name" placeholder="Product name">
    <input id="price" placeholder="Price">
    <input id="stock" placeholder="Stock">
    <input id="image" placeholder="Image URL">
    <input id="desc" placeholder="Description">

    <button onclick="addProduct()">Add Product</button>

    <h3>Products</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="productTable"></tbody>
    </table>
  </div>

  <!-- ORDERS -->
  <div id="ordersTab" class="section">
    <h3>Orders</h3>

    <table>
      <thead>
        <tr>
          <th>Order</th>
          <th>Customer</th>
          <th>Phone</th>
          <th>Total</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="ordersTable"></tbody>
    </table>
  </div>

</div>

<script>
/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://ayfqdhsojxitjkrfmarq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5ZnFkaHNvanhpdGprcmZtYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzIzNjUsImV4cCI6MjA5MTg0ODM2NX0.FkoIUlzkjvjYIuZEKKjCc3JDhzdHxmTn9yPat8y0PSg";

const { createClient } = supabase;
const client = createClient(SUPABASE_URL, SUPABASE_KEY);

/* ================= INIT SAFE ================= */
document.addEventListener("DOMContentLoaded", async () => {
  await checkAuth();
  loadProducts();
  loadOrders();
});

/* ================= AUTH ================= */
async function checkAuth() {
  const { data } = await client.auth.getSession();

  if (!data.session) {
    window.location.href = "admin-login.html";
  }
}

async function logout() {
  await client.auth.signOut();
  window.location.href = "admin-login.html";
}

/* ================= PRODUCTS ================= */
async function loadProducts() {
  const { data } = await client.from("products").select("*");

  const table = document.getElementById("productTable");
  table.innerHTML = "";

  data.forEach(p => {
    table.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>R${p.price}</td>
        <td>
          <input value="${p.stock}"
            onchange="updateStock('${p.id}', this.value)">
        </td>
        <td>
          <button class="danger" onclick="deleteProduct('${p.id}')">Delete</button>
        </td>
      </tr>
    `;
  });
}

async function addProduct() {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const stock = document.getElementById("stock").value;
  const image = document.getElementById("image").value;
  const desc = document.getElementById("desc").value;

  await client.from("products").insert([{
    name,
    price: parseFloat(price),
    stock: parseInt(stock),
    image_url: image,
    description: desc
  }]);

  loadProducts();
}

async function updateStock(id, stock) {
  await client.from("products")
    .update({ stock: parseInt(stock) })
    .eq("id", id);
}

async function deleteProduct(id) {
  await client.from("products")
    .delete()
    .eq("id", id);

  loadProducts();
}

/* ================= ORDERS ================= */
async function loadOrders() {
  const { data } = await client
    .from("orders")
    .select("*")
    .order("created_at", { ascending: false });

  const table = document.getElementById("ordersTable");
  table.innerHTML = "";

  data.forEach(o => {
    table.innerHTML += `
      <tr>
        <td>${o.order_id}</td>
        <td>${o.customer_name}</td>
        <td>${o.phone || "-"}</td>
        <td>R${o.total}</td>
        <td>${o.status}</td>
        <td>
          <button class="btn paid" onclick="markPaid('${o.id}')">Paid</button>
          <button class="btn delivered" onclick="markDelivered('${o.id}')">Delivered</button>
          <button class="btn delete" onclick="deleteOrder('${o.id}')">Delete</button>
        </td>
      </tr>
    `;
  });
}

async function markPaid(id) {
  await client.from("orders")
    .update({ status: "paid" })
    .eq("id", id);

  loadOrders();
}

async function markDelivered(id) {
  await client.from("orders")
    .update({ status: "delivered" })
    .eq("id", id);

  loadOrders();
}

async function deleteOrder(id) {
  await client.from("orders")
    .delete()
    .eq("id", id);

  loadOrders();
}

/* ================= UI ================= */
function showTab(tabId, event) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));

  document.getElementById(tabId).classList.add("active");
  event.target.classList.add("active");
}
</script>

</body>
</html>
