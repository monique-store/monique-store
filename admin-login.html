<!DOCTYPE html>
<html>
<head>
  <title>Admin Login - Monique's Store</title>

  <style>
    body {
      font-family: Arial;
      background: #f7f3ea;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #c2b59b;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      opacity: 0.9;
    }

    .error {
      color: red;
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Admin Login</h2>

  <input id="password" type="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>

  <div class="error" id="error">Wrong password</div>
</div>

<script>
const ADMIN_PASSWORD = "MoniqueAdmin098765@";

function login() {
  const pass = document.getElementById("password").value;

  if (pass === ADMIN_PASSWORD) {
    sessionStorage.setItem("admin", "true");
    window.location.href = "admin.html"; // change if your file name differs
  } else {
    document.getElementById("error").style.display = "block";
  }
}
</script>

</body>
</html>
