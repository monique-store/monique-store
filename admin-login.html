<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #f7f3ea;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #c2b59b;
      border: none;
      color: white;
      border-radius: 10px;
    }

    .error {
      color: red;
      font-size: 13px;
      display: none;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Admin Login</h2>

  <input type="password" id="password" placeholder="Enter password">
  <button onclick="login()">Login</button>

  <p class="error" id="error">Wrong password</p>
</div>

<script>
const SUPABASE_URL = "https://ayfqdhsojxitjkrfmarq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5ZnFkaHNvanhpdGprcmZtYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzIzNjUsImV4cCI6MjA5MTg0ODM2NX0.FkoIUlzkjvjYIuZEKKjCc3JDhzdHxmTn9yPat8y0PSg";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// fixed admin email (hidden from UI)
const ADMIN_EMAIL = "admin@monique.store";

async function login() {
  const password = document.getElementById("password").value;

  const { data, error } = await client.auth.signInWithPassword({
    email: ADMIN_EMAIL,
    password: password
  });

  if (error) {
    document.getElementById("error").style.display = "block";
    return;
  }

  window.location.href = "admin.html";
}
</script>

</body>
</html>
