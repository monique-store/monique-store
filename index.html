<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Inter, Arial;
      background: #f7f3ea;
      margin: 0;
    }

    header {
  padding: 20px;
  text-align: center;
  font-size: 34px;
  font-family: 'Playfair Display', serif;
  letter-spacing: 1px;
  color: #2b2b2b;
}

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    #products {
      flex: 3;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .product {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .product img {
      width: 100%;
      height: 220px;
      object-fit: contain;
      background: #faf7f2;
      padding: 12px;
    }

    .product-content {
      padding: 14px;
    }

    button {
      background: #c2b59b;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
    }

    /* CART */
    #cart {
      flex: 1;
      background: white;
      padding: 15px;
      border-radius: 16px;
      position: sticky;
      top: 20px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 2fr 1fr auto;
      gap: 10px;
      padding: 6px 0;
    }

    .cart-remove {
      background: none;
      color: red;
      border: none;
      cursor: pointer;
    }

    /* OVERLAY */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 999;
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
    }

    .close-btn {
      display: none;
      background: none;
      font-size: 20px;
      border: none;
      cursor: pointer;
    }

    /* CHECKOUT MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #mobileCartBtn {
      display: none;
    }

    /* MOBILE */
    @media (max-width: 768px) {

      .container {
        flex-direction: column;
      }

      #products {
        grid-template-columns: repeat(2, 1fr);
      }

      #cart {
        position: fixed !important;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 75%;
        transform: translateY(100%);
        transition: transform 0.3s ease;
        z-index: 1000;
      }

      #cart.open {
        transform: translateY(0);
      }

      #overlay.open {
        display: block;
      }

      .close-btn {
        display: block;
      }

      #mobileCartBtn {
        display: block;
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 14px;
        border-radius: 30px;
        background: #c2b59b;
        color: white;
        z-index: 1100;
      }
    }
  </style>
</head>

<body>

<header>Monique's Store</header>

<div class="container">
  <div id="products">Loading...</div>

  <div id="cart">
    <div class="cart-header">
      <h3>Cart</h3>
      <button class="close-btn" onclick="closeCart()">✕</button>
    </div>

    <div id="cartItems"></div>
    <h4>Total: <span id="cartTotal">R0.00</span></h4>

    <button onclick="openCheckout()">Checkout</button>
  </div>
</div>

<div id="overlay" onclick="closeCart()"></div>

<div id="mobileCartBtn" onclick="openCart()">🛒 <span id="cartCount">0</span></div>

<!-- CHECKOUT -->
<div class="modal" id="checkoutModal">
  <div class="modal-content">
    <h3>Checkout</h3>
    <input id="custName" placeholder="Your Name">
    <input id="custPhone" placeholder="Phone Number">
    <button onclick="placeOrder()">Place Order</button>
    <button onclick="closeCheckout()" style="background:#999;">Cancel</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://ayfqdhsojxitjkrfmarq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5ZnFkaHNvanhpdGprcmZtYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzIzNjUsImV4cCI6MjA5MTg0ODM2NX0.FkoIUlzkjvjYIuZEKKjCc3JDhzdHxmTn9yPat8y0PSg";

let client;
let cart = [];
let currentProducts = [];

function init() {
  if (!window.supabase) return setTimeout(init, 100);
  client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  loadProducts();
}
init();

async function loadProducts() {
  const { data } = await client.from("products").select("*");
  currentProducts = data;

  const container = document.getElementById("products");
  container.innerHTML = "";

  data.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <img src="${p.image_url}">
        <div class="product-content">
          <h3>${p.name}</h3>
          <p>R${p.price}</p>
          <button onclick="addToCart('${p.id}','${p.name}',${p.price})"
          ${p.stock <= 0 ? "disabled" : ""}>
          Add to Cart</button>
        </div>
      </div>`;
  });
}

function addToCart(id, name, price) {
  const product = currentProducts.find(p => p.id === id);
  if (!product || product.stock <= 0) return alert("Out of stock");

  const existing = cart.find(i => i.id === id);

  if (existing) {
    if (existing.qty >= product.stock) return alert("No more stock");
    existing.qty++;
  } else {
    cart.push({ id, name, price, qty: 1 });
  }

  renderCart();
}

function removeFromCart(id) {
  cart = cart.filter(i => i.id !== id);
  renderCart();
}

function renderCart() {
  let total = 0;
  const container = document.getElementById("cartItems");
  container.innerHTML = "";

  cart.forEach(i => {
    const sub = i.price * i.qty;
    total += sub;

    container.innerHTML += `
      <div class="cart-item">
        <span>${i.name} x${i.qty}</span>
        <span>R${sub.toFixed(2)}</span>
        <button class="cart-remove" onclick="removeFromCart('${i.id}')">✕</button>
      </div>`;
  });

  document.getElementById("cartTotal").innerText = `R${total.toFixed(2)}`;
  document.getElementById("cartCount").innerText = cart.length;
}

/* CHECKOUT */
function openCheckout() {
  if (!cart.length) return alert("Cart empty");
  document.getElementById("checkoutModal").style.display = "flex";
}

function closeCheckout() {
  document.getElementById("checkoutModal").style.display = "none";
}

/* MOBILE */
function openCart() {
  document.getElementById("cart").classList.add("open");
  document.getElementById("overlay").classList.add("open");
}
function closeCart() {
  document.getElementById("cart").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

/* FINAL PLACE ORDER (YOUR VERSION) */
async function placeOrder() {
  const name = custName.value;
  const phone = custPhone.value;
  if (!name || !phone) return alert("Enter details");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const orderId = "INV-" + Math.floor(Math.random() * 1000000);
  const date = new Date().toLocaleString();

  let y = 20;

  doc.setFont("helvetica","bold");
  doc.setFontSize(18);
  doc.text("MONIQUE'S STORE",14,y);

  doc.setFontSize(10);
  doc.setFont("helvetica","normal");
  doc.text(`Invoice: ${orderId}`,140,y);
  doc.text(`Date: ${date}`,140,y+6);

  y+=15;
  doc.text(`Customer: ${name}`,14,y);
  doc.text(`Phone: ${phone}`,14,y+6);

  y+=12;
  doc.setFont("helvetica","bold");
  doc.text("Item",14,y);
  doc.text("Qty",110,y);
  doc.text("Price",140,y);
  doc.text("Total",170,y);

  y+=4;
  doc.line(14,y,195,y);
  y+=6;

  doc.setFont("helvetica","normal");

  let total=0;
  cart.forEach(item=>{
    const sub=item.price*item.qty;
    doc.text(item.name,14,y);
    doc.text(String(item.qty),110,y);
    doc.text(`R${item.price}`,140,y);
    doc.text(`R${sub}`,170,y);
    total+=sub;
    y+=8;
  });

  y+=5;
  doc.line(14,y,195,y);
  y+=8;

  doc.setFont("helvetica","bold");
  doc.text(`TOTAL: R${total.toFixed(2)}`,14,y);

  await client.from("orders").insert([{
    order_id: orderId,
    customer_name: name,
    phone: phone,
    items: cart,
    total: total,
    status: "pending"
  }]);

  doc.save(`${orderId}.pdf`);

  const itemsText = cart.map(i=>`• ${i.name} (R${i.price})`).join("\n");

  const message =
`📦 NEW ORDER RECEIVED

Invoice: ${orderId}
Customer: ${name}
Phone: ${phone}

Items:
${itemsText}

Total: R${total.toFixed(2)}

📄 Invoice has been downloaded by customer`;

  window.open(`https://wa.me/27839946370?text=${encodeURIComponent(message)}`);

  cart=[];
  renderCart();
  closeCheckout();
  closeCart();
}
</script>

</body>
</html>
