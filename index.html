<!DOCTYPE html>
<html>
<head>
  <title>Monique's Store</title>

  <!-- ✅ MOBILE FIX -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Inter, Arial;
      background: #f7f3ea;
      margin: 0;
      padding: 0;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 30px;
      font-weight: bold;
      color: #2b2b2b;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    /* DESKTOP PRODUCTS */
    #products {
      flex: 3;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .product {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
    }

    .product img {
      width: 100%;
      height: 220px;
      object-fit: contain;
      background: #faf7f2;
      padding: 12px;
    }

    .product-content {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .price {
      font-weight: 700;
    }

    button {
      background: #c2b59b;
      color: white;
      border: none;
      padding: 11px;
      border-radius: 12px;
      cursor: pointer;
    }

    /* DESKTOP CART */
    #cart {
      flex: 1;
      background: white;
      padding: 15px;
      border-radius: 16px;
      position: sticky;
      top: 20px;
      height: fit-content;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 2fr 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .cart-remove {
      background: transparent;
      border: none;
      color: #b33;
      font-weight: bold;
      cursor: pointer;
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-weight: bold;
    }

    .badge {
      font-size: 11px;
      background: #e7dfcf;
      padding: 4px 8px;
      border-radius: 20px;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    /* HIDE MOBILE BUTTON ON DESKTOP */
    #mobileCartBtn {
      display: none;
    }

    /* ================= MOBILE ONLY ================= */
    @media (max-width: 768px) {

      .container {
        flex-direction: column;
        padding: 10px;
      }

      #products {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .product img {
        height: 160px;
      }

      /* MOBILE CART (OVERLAY) */
      #cart {
        position: fixed;
        bottom: -100%;
        left: 0;
        width: 100%;
        height: 60%;
        border-radius: 20px 20px 0 0;
        transition: 0.3s;
        z-index: 1000;
      }

      #cart.open {
        bottom: 0;
      }

      /* FLOATING BUTTON */
      #mobileCartBtn {
        display: block;
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #c2b59b;
        color: white;
        padding: 14px 18px;
        border-radius: 30px;
        font-size: 16px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        z-index: 1100;
        cursor: pointer;
      }

      #cartCount {
        background: black;
        color: white;
        padding: 2px 6px;
        border-radius: 10px;
        margin-left: 5px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

<header>Monique's Store</header>

<div class="container">
  <div id="products">Loading...</div>

  <div id="cart">
    <h3>Cart</h3>
    <div id="cartItems"></div>

    <div class="cart-total">
      <span>Total</span>
      <span id="cartTotal">R0.00</span>
    </div>

    <button onclick="openCheckout()" style="width:100%">Checkout</button>
  </div>
</div>

<!-- MOBILE CART BUTTON -->
<div id="mobileCartBtn" onclick="toggleCart()">
  🛒 <span id="cartCount">0</span>
</div>

<!-- CHECKOUT -->
<div class="modal" id="checkoutModal">
  <div class="modal-content">
    <h3>Checkout</h3>
    <input id="custName" placeholder="Your Name" />
    <input id="custPhone" placeholder="Phone Number" />
    <button onclick="placeOrder()">Place Order</button>
    <button onclick="closeCheckout()" style="background:#999;">Cancel</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://ayfqdhsojxitjkrfmarq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5ZnFkaHNvanhpdGprcmZtYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzIzNjUsImV4cCI6MjA5MTg0ODM2NX0.FkoIUlzkjvjYIuZEKKjCc3JDhzdHxmTn9yPat8y0PSg";

let client;
let cart = [];
let currentProducts = [];

function initSupabase() {
  if (!window.supabase) return setTimeout(initSupabase, 100);
  client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  loadProducts();
}
initSupabase();

async function loadProducts() {
  const { data } = await client.from("products").select("*");
  const container = document.getElementById("products");
  container.innerHTML = "";

  currentProducts = data;

  data.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <img src="${p.image_url}" />
        <div class="product-content">
          <span class="badge">${p.stock > 0 ? "In Stock" : "Out of Stock"}</span>
          <h3>${p.name}</h3>
          <div class="price">R${p.price}</div>
          <p>${p.description}</p>
          <button onclick="addToCart('${p.id}','${p.name}',${p.price})"
            ${p.stock <= 0 ? "disabled" : ""}>
            Add to Cart
          </button>
        </div>
      </div>`;
  });
}

function addToCart(id, name, price) {
  const existing = cart.find(i => i.id === id);
  if (existing) existing.qty++;
  else cart.push({ id, name, price, qty: 1 });
  renderCart();
}

function removeFromCart(id) {
  cart = cart.filter(i => i.id !== id);
  renderCart();
}

function renderCart() {
  const container = document.getElementById("cartItems");
  let total = 0;
  container.innerHTML = "";

  cart.forEach(item => {
    const subtotal = item.price * item.qty;
    total += subtotal;

    container.innerHTML += `
      <div class="cart-item">
        <span>${item.name} x${item.qty}</span>
        <span>R${subtotal.toFixed(2)}</span>
        <button onclick="removeFromCart('${item.id}')">✕</button>
      </div>`;
  });

  document.getElementById("cartTotal").innerText = `R${total.toFixed(2)}`;
  document.getElementById("cartCount").innerText = cart.length;
}

function toggleCart() {
  document.getElementById("cart").classList.toggle("open");
}

function openCheckout() {
  if (cart.length === 0) return alert("Cart is empty");
  document.getElementById("checkoutModal").style.display = "flex";
}

function closeCheckout() {
  document.getElementById("checkoutModal").style.display = "none";
}

async function placeOrder() {
  const name = custName.value;
  const phone = custPhone.value;

  if (!name || !phone) return alert("Enter details");

  let total = 0;
  cart.forEach(i => total += i.price * i.qty);

  await client.from("orders").insert([{
    order_id: "INV-" + Date.now(),
    customer_name: name,
    phone: phone,
    items: cart,
    total: total,
    status: "pending"
  }]);

  alert("Order placed!");
  cart = [];
  renderCart();
  closeCheckout();
}
</script>

</body>
</html>
