<!DOCTYPE html>
<html>
<head>
  <title>Monique's Store</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Inter, Arial;
      background: #f7f3ea;
      margin: 0;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 30px;
      font-weight: bold;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    #products {
      flex: 3;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .product {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .product img {
      width: 100%;
      height: 220px;
      object-fit: contain;
      background: #faf7f2;
      padding: 12px;
    }

    .product-content {
      padding: 14px;
    }

    .price { font-weight: bold; }

    button {
      background: #c2b59b;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
    }

    /* DESKTOP CART */
    #cart {
      flex: 1;
      background: white;
      padding: 15px;
      border-radius: 16px;
      position: sticky;
      top: 20px;
    }

    /* MOBILE OVERLAY BACKGROUND */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 999;
    }

    /* MOBILE CART */
    @media (max-width: 768px) {

      .container {
        flex-direction: column;
      }

      #products {
        grid-template-columns: repeat(2, 1fr);
      }

      #cart {
        position: fixed;
        bottom: -100%;
        left: 0;
        width: 100%;
        height: 70%;
        border-radius: 20px 20px 0 0;
        transition: 0.3s;
        z-index: 1000;
        overflow-y: auto;
      }

      #cart.open {
        bottom: 0;
      }

      #overlay.open {
        display: block;
      }

      #mobileCartBtn {
        display: block;
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #c2b59b;
        color: white;
        padding: 14px 18px;
        border-radius: 30px;
        z-index: 1100;
      }
    }

    #mobileCartBtn {
      display: none;
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-btn {
      background: none;
      color: black;
      font-size: 20px;
      border: none;
      cursor: pointer;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
    }

  </style>
</head>

<body>

<header>Monique's Store</header>

<div class="container">
  <div id="products">Loading...</div>

  <div id="cart">
    <div class="cart-header">
      <h3>Cart</h3>
      <button class="close-btn" onclick="closeCart()">✕</button>
    </div>

    <div id="cartItems"></div>

    <h4>Total: <span id="cartTotal">R0.00</span></h4>

    <button onclick="placeOrder()">Checkout</button>
  </div>
</div>

<div id="overlay" onclick="closeCart()"></div>

<div id="mobileCartBtn" onclick="openCart()">
  🛒 <span id="cartCount">0</span>
</div>

<script>
const SUPABASE_URL = "https://ayfqdhsojxitjkrfmarq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";

let client;
let cart = [];

function init() {
  if (!window.supabase) return setTimeout(init, 100);
  client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  loadProducts();
}
init();

async function loadProducts() {
  const { data } = await client.from("products").select("*");
  const container = document.getElementById("products");

  container.innerHTML = "";

  data.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <img src="${p.image_url}" />
        <div class="product-content">
          <h3>${p.name}</h3>
          <div class="price">R${p.price}</div>
          <button onclick="addToCart('${p.id}','${p.name}',${p.price})">
            Add to Cart
          </button>
        </div>
      </div>`;
  });
}

function addToCart(id, name, price) {
  const item = cart.find(i => i.id === id);
  if (item) item.qty++;
  else cart.push({ id, name, price, qty: 1 });

  renderCart();
}

function renderCart() {
  const container = document.getElementById("cartItems");
  let total = 0;

  container.innerHTML = "";

  cart.forEach(i => {
    total += i.price * i.qty;
    container.innerHTML += `
      <div class="cart-item">
        <span>${i.name} x${i.qty}</span>
        <span>R${(i.price * i.qty).toFixed(2)}</span>
      </div>`;
  });

  document.getElementById("cartTotal").innerText = `R${total.toFixed(2)}`;
  document.getElementById("cartCount").innerText = cart.length;
}

/* MOBILE UX */
function openCart() {
  document.getElementById("cart").classList.add("open");
  document.getElementById("overlay").classList.add("open");
}

function closeCart() {
  document.getElementById("cart").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

async function placeOrder() {
  alert("Order placed!");
  cart = [];
  renderCart();
  closeCart();
}
</script>

</body>
</html>
