<!DOCTYPE html>
<html>
<head>
  <title>Monique's Store</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Inter, Arial;
      background: #f7f3ea;
      margin: 0;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 30px;
      font-weight: bold;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    #products {
      flex: 3;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .product {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
    }

    .product img {
      width: 100%;
      height: 220px;
      object-fit: contain;
      background: #faf7f2;
      padding: 12px;
    }

    .product-content {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .price { font-weight: bold; }

    button {
      background: #c2b59b;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    /* CART */
    #cart {
      flex: 1;
      background: white;
      padding: 15px;
      border-radius: 16px;
      position: sticky;
      top: 20px;
      height: fit-content;
    }

    /* OVERLAY */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 999;
    }

    /* CART HEADER */
    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-btn {
      display: none;
      background: none;
      font-size: 22px;
      border: none;
      cursor: pointer;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 2fr 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    .cart-remove {
      background: transparent;
      border: none;
      color: #b33;
      font-weight: bold;
      cursor: pointer;
    }

    #mobileCartBtn { display: none; }

    /* MOBILE */
    @media (max-width: 768px) {

      .container { flex-direction: column; }

      #products {
        grid-template-columns: repeat(2, 1fr);
      }

      #cart {
        position: fixed !important;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 75%;
        border-radius: 20px 20px 0 0;
        z-index: 1000;
        overflow-y: auto;

        transform: translateY(100%);
        transition: transform 0.3s ease;

        flex: unset;
      }

      #cart.open {
        transform: translateY(0);
      }

      #overlay.open {
        display: block;
      }

      .close-btn { display: block; }

      #mobileCartBtn {
        display: block;
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #c2b59b;
        color: white;
        padding: 14px 18px;
        border-radius: 30px;
        z-index: 1100;
      }

      #cartCount {
        background: black;
        color: white;
        padding: 2px 6px;
        border-radius: 10px;
        margin-left: 5px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

<header>Monique's Store</header>

<div class="container">
  <div id="products">Loading...</div>

  <div id="cart">
    <div class="cart-header">
      <h3>Cart</h3>
      <button class="close-btn" onclick="closeCart()">✕</button>
    </div>

    <div id="cartItems"></div>

    <h4>Total: <span id="cartTotal">R0.00</span></h4>

    <button onclick="openCheckout()">Checkout</button>
  </div>
</div>

<div id="overlay" onclick="closeCart()"></div>

<div id="mobileCartBtn" onclick="openCart()">
  🛒 <span id="cartCount">0</span>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal" id="checkoutModal">
  <div class="modal-content">
    <h3 style="margin-bottom:10px;">Checkout</h3>

    <input id="custName" placeholder="Full Name" />
    <input id="custPhone" placeholder="Phone Number" />

    <button onclick="placeOrder()" class="primary-btn">
      Confirm Order
    </button>

    <button onclick="closeCheckout()" class="secondary-btn">
      Cancel
    </button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://ayfqdhsojxitjkrfmarq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5ZnFkaHNvanhpdGprcmZtYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzIzNjUsImV4cCI6MjA5MTg0ODM2NX0.FkoIUlzkjvjYIuZEKKjCc3JDhzdHxmTn9yPat8y0PSg";

let client;
let cart = [];
let currentProducts = [];

function init() {
  if (!window.supabase) return setTimeout(init, 100);
  client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  loadProducts();
}
init();

/* LOAD */
async function loadProducts() {
  const { data } = await client.from("products").select("*");
  currentProducts = data;

  const container = document.getElementById("products");
  container.innerHTML = "";

  data.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <img src="${p.image_url}" />
        <div class="product-content">
          <h3>${p.name}</h3>
          <div class="price">R${p.price}</div>
          <button onclick="addToCart('${p.id}','${p.name}',${p.price})"
            ${p.stock <= 0 ? "disabled" : ""}>
            ${p.stock > 0 ? "Add to Cart" : "Out of Stock"}
          </button>
        </div>
      </div>`;
  });
}

/* ADD */
function addToCart(id, name, price) {
  const product = currentProducts.find(p => p.id === id);
  if (!product || product.stock <= 0) return alert("Out of stock");

  const existing = cart.find(i => i.id === id);

  if (existing) {
    if (existing.qty >= product.stock) return alert("No more stock");
    existing.qty++;
  } else {
    cart.push({ id, name, price, qty: 1 });
  }

  renderCart();
}

/* REMOVE */
function removeFromCart(id) {
  const index = cart.findIndex(i => i.id === id);
  if (index === -1) return;

  if (cart[index].qty > 1) cart[index].qty--;
  else cart.splice(index, 1);

  renderCart();
}

/* RENDER */
function renderCart() {
  const container = document.getElementById("cartItems");
  let total = 0;

  container.innerHTML = "";

  cart.forEach(i => {
    const sub = i.price * i.qty;
    total += sub;

    container.innerHTML += `
      <div class="cart-item">
        <span>${i.name} x${i.qty}</span>
        <span>R${sub.toFixed(2)}</span>
        <button class="cart-remove" onclick="removeFromCart('${i.id}')">✕</button>
      </div>`;
  });

  document.getElementById("cartTotal").innerText = `R${total.toFixed(2)}`;
  document.getElementById("cartCount").innerText = cart.length;
}

/* CHECKOUT */
function openCheckout() {
  if (cart.length === 0) return alert("Cart empty");
  document.getElementById("checkoutModal").style.display = "flex";
}

function closeCheckout() {
  document.getElementById("checkoutModal").style.display = "none";
}

/* MOBILE */
function openCart() {
  cartEl = document.getElementById("cart");
  overlay = document.getElementById("overlay");
  cartEl.classList.add("open");
  overlay.classList.add("open");
}

function closeCart() {
  cartEl = document.getElementById("cart");
  overlay = document.getElementById("overlay");
  cartEl.classList.remove("open");
  overlay.classList.remove("open");
}

/* PLACE ORDER */
async function placeOrder() {
  const name = custName.value;
  const phone = custPhone.value;
  if (!name || !phone) return alert("Enter details");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const orderId = "INV-" + Math.floor(Math.random() * 1000000);
  let total = 0;
  let y = 20;

  doc.text("MONIQUE'S STORE", 20, y);

  cart.forEach(i => {
    const sub = i.price * i.qty;
    total += sub;
    doc.text(`${i.name} x${i.qty} - R${sub}`, 20, y += 10);
  });

  doc.text(`TOTAL: R${total}`, 20, y += 10);
  doc.save(orderId + ".pdf");

  await client.from("orders").insert([{ order_id: orderId, customer_name: name, phone, items: cart, total }]);

  const msg = `New Order ${orderId}\n${cart.map(i => i.name+" x"+i.qty).join("\n")}\nTotal: R${total}`;
  window.open(`https://wa.me/27839946370?text=${encodeURIComponent(msg)}`);

  cart = [];
  renderCart();
  closeCheckout();
  closeCart();
}
</script>

</body>
</html>
